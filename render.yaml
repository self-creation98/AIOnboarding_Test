services:
  - type: web
    name: ai-onboarding
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: "gpt-4o-mini"
      - key: LOG_LEVEL
        value: "INFO"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ALLOWED_EMAIL_DOMAINS
        value: "company.com"
      - key: EMAIL_PROVIDER
        value: "console"
      - key: MAGIC_LINK_SECRET
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: BACKEND_BASE_URL
        sync: false
